services:
  - type: web
    name: interview-coach-api
    env: docker
    healthCheckPath: /health
    envVars:
      - key: DISABLE_DATABASE
        value: "1"
      - key: ROUTING_MODE
        value: "chain"
      - key: REQUEST_TIMEOUT_S
        value: "25"
      - key: MAX_RETRIES_PER_PROVIDER
        value: "0"
      - key: ALLOWED_ORIGINS
        value: "*"
      # ─── Add your API keys in the Render Dashboard, NOT here ───
      # GROQ_API_KEY
      # NVIDIA_API_KEY
      # GEMINI_API_KEY
      # GITHUB_TOKEN
      # CLOUDFLARE_ACCOUNT_ID
      # CLOUDFLARE_API_KEY
      # GATEWAY_SECRET
      # ADMIN_SECRET
